<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search — WeLookup</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(64,88,255,0.06), transparent),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    .search-page {
      padding: 26px 16px 60px;
      max-width: 1020px;
      margin: 0 auto;
    }

    .search-top {
      margin-top: 24px;
      margin-bottom: 20px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #cdd6e3;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
    }

    .search-top h1 {
      font-size: 46px;
      line-height: 1.05;
      margin: 14px 0 14px;
      font-weight: 800;
    }

    .search-top p {
      color: var(--muted);
      font-size: 18px;
      margin: 0;
      max-width: 780px;
    }

    .search-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 18px;
      padding: 18px;
      margin-top: 22px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    }

    .search-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 260px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 16px;
      outline: none;
    }

    .search-input:focus {
      border-color: rgba(64, 88, 255, 0.95);
      box-shadow: 0 0 0 3px rgba(64, 88, 255, 0.16);
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-btn {
      background: linear-gradient(180deg, #4961ff, #3a4ff0);
      color: white;
      border-radius: 14px;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
    }

    .search-btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .search-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 10px;
    }

    .search-feedback {
      margin-top: 18px;
      color: #d9e2f0;
      font-size: 14px;
    }

    .search-feedback.error {
      color: #ff8f8f;
    }

    #results {
      margin-top: 18px;
      display: grid;
      gap: 14px;
    }

    .result-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
    }

    .result-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .result-title {
      margin: 0;
      font-size: 20px;
      color: #fff;
      line-height: 1.2;
    }

    .pill {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      color: #d7e1f2;
      white-space: nowrap;
    }

    .result-sub {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .meta-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px;
    }

    .meta-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .meta-value {
      color: #edf3ff;
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .chip {
      font-size: 12px;
      color: #d8e1f4;
      background: rgba(64,88,255,0.12);
      border: 1px solid rgba(64,88,255,0.32);
      border-radius: 999px;
      padding: 4px 10px;
      text-decoration: none;
    }

    .result-description {
      margin: 10px 0 0;
      color: #cad3df;
      line-height: 1.55;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .search-top h1 {
        font-size: 36px;
      }

      .search-row {
        flex-direction: column;
        align-items: stretch;
      }

      .search-btn {
        width: 100%;
      }

      .meta-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Header -->
    <header>
      <div class="brand"
           onclick="location.href='/'"
           style="cursor:pointer; display:flex; align-items:center; gap:12px;">

        <img
          src="welookuplogo.png"
          alt="WeLookup Logo"
          style="width:32px; height:auto;"
        />

        <div>
          <div class="brand-title">WeLookup</div>
          <div class="brand-sub">Instant Store Analysis</div>
        </div>
      </div>

      <nav class="nav">
        <a href="/search.html">Search</a>
        <a href="https://welookup.substack.com/">Articles</a>
        <a href="/privacy-policy.html">Privacy Policy</a>
      </nav>
    </header>

    <!-- Main -->
    <main class="search-page">
      <div class="search-top">
        <span class="eyebrow">Shop Intelligence</span>
        <h1>Search Store Data</h1>
        <p>
          Search by domain, Shopify domain, or store title to discover a shop profile with links and core metadata.
        </p>
      </div>

      <div class="search-box">
        <div class="search-row">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="Try: allbirds.com or allbirds.myshopify.com or store title"
            autocomplete="off"
          />
          <button id="searchBtn" class="search-btn" type="button">Search</button>
        </div>

        <div class="search-note">
          Supports domain, full URL, and partial store title.
        </div>
      </div>

      <div id="feedback" class="search-feedback"></div>
      <div id="results"></div>
    </main>

  </div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
